<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Telemetron · AI agent monitoring</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f1420; color: #e6e9ef;
  }
  header {
    padding: 18px 24px; border-bottom: 1px solid #222a3a;
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .sub { color: #8b95a7; font-size: 13px; }
  #status { margin-left: auto; font-size: 13px; color: #8b95a7; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot.ok { background: #36c08a; } .dot.off { background: #d05858; }
  main { padding: 24px; display: grid; gap: 24px; grid-template-columns: 1fr; max-width: 1200px; margin: 0 auto; }
  .card { background: #151b29; border: 1px solid #222a3a; border-radius: 12px; padding: 18px 20px; }
  .card h2 { font-size: 14px; margin: 0 0 14px; font-weight: 600; color: #cdd3df; }
  .chart-wrap { position: relative; height: 340px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #222a3a; }
  th { color: #8b95a7; font-weight: 500; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 8px; }
  .empty { color: #8b95a7; padding: 40px 0; text-align: center; }

  /* Filter bar */
  #filters { display: flex; gap: 28px; flex-wrap: wrap; align-items: center; padding: 14px 20px; }
  .fgroup { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .flabel { color: #8b95a7; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
    border: 1px solid #2c3447; border-radius: 999px; font-size: 12px;
    cursor: pointer; color: #e6e9ef; background: #1b2233; user-select: none;
    transition: opacity .12s ease;
  }
  .chip .swatch { margin: 0; width: 9px; height: 9px; }
  .chip.off { opacity: .35; }
  .mini, select {
    background: #1b2233; border: 1px solid #2c3447; color: #cdd3df;
    border-radius: 6px; padding: 5px 9px; font-size: 12px; cursor: pointer;
  }
  .mini:hover { border-color: #3a4458; }
  .sep { width: 1px; align-self: stretch; background: #222a3a; }
</style>
</head>
<body>
<header>
  <h1>Telemetron — AI agent monitoring</h1>
  <span class="sub">per-minute aggregates from the <code>agent_metrics</code> topic</span>
  <span id="status"></span>
</header>

<main>
  <div class="card" id="filters">
    <div class="fgroup">
      <span class="flabel">Agent types</span>
      <div id="typeChips" class="chips"></div>
      <button id="allBtn" class="mini">all</button>
      <button id="noneBtn" class="mini">none</button>
    </div>
    <div class="sep"></div>
    <div class="fgroup">
      <span class="flabel">Window</span>
      <select id="windowSel">
        <option value="15">last 15 min</option>
        <option value="30" selected>last 30 min</option>
        <option value="60">last 60 min</option>
        <option value="0">all</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>Average latency (ms) by agent type — per minute</h2>
    <div class="chart-wrap"><canvas id="latencyChart"></canvas></div>
  </div>

  <div class="card">
    <h2>Median tool calls by agent type — per minute</h2>
    <div class="chart-wrap"><canvas id="toolsChart"></canvas></div>
  </div>

  <div class="card">
    <h2>Latest values by type</h2>
    <table id="latest">
      <thead><tr>
        <th>Agent type</th>
        <th class="num">avg latency, ms</th>
        <th class="num">median tool calls</th>
        <th class="num">minute</th>
      </tr></thead>
      <tbody><tr><td colspan="4" class="empty">waiting for data…</td></tr></tbody>
    </table>
  </div>
</main>

<script>
const PALETTE = ["#5b9bd5","#36c08a","#e0a458","#c97bd0","#d05858","#5ad0c4","#b0c45b","#9b8cf0"];
const colorOf = {};
function pick(name){ if(!(name in colorOf)) colorOf[name] = PALETTE[Object.keys(colorOf).length % PALETTE.length]; return colorOf[name]; }

// ---- Filter state (persists across the 3s refresh) ----
const hidden = new Set();   // agent types toggled off
let windowMin = 30;         // 0 = all
let knownTypes = [];        // every type seen so far, for stable chips

// Optional initial state from the URL, so a filtered view is shareable:
//   ?window=15&show=Code%20assistant,RAG%20answer
const params = new URLSearchParams(location.search);
if(params.has("window")){ const w = parseInt(params.get("window"), 10); if(!isNaN(w)) windowMin = w; }
const showOnly = params.has("show") ? new Set(params.get("show").split(",").map(s => s.trim())) : null;

function applyFilters(rows){
  let out = rows;
  if(windowMin > 0){
    const times = [...new Set(rows.map(r => r.time))].sort();
    const keep = new Set(times.slice(-windowMin));
    out = out.filter(r => keep.has(r.time));
  }
  return out.filter(r => !hidden.has(r.type_name));
}

function syncChips(rows){
  let changed = false;
  rows.forEach(r => {
    if(!knownTypes.includes(r.type_name)){
      knownTypes.push(r.type_name); changed = true;
      if(showOnly && !showOnly.has(r.type_name)) hidden.add(r.type_name);
    }
  });
  if(changed){ knownTypes.sort(); renderChips(); }
}

function renderChips(){
  const c = document.getElementById("typeChips");
  c.innerHTML = knownTypes.map(t =>
    `<span class="chip ${hidden.has(t) ? "off" : ""}" data-t="${t}">
       <span class="swatch" style="background:${pick(t)}"></span>${t}</span>`).join("");
  c.querySelectorAll(".chip").forEach(el => {
    el.onclick = () => {
      const t = el.dataset.t;
      hidden.has(t) ? hidden.delete(t) : hidden.add(t);
      renderChips(); refresh();
    };
  });
}

function buildSeries(rows, field){
  const times = [...new Set(rows.map(r => r.time))].sort();
  const types = [...new Set(rows.map(r => r.type_name))];
  const map = {};
  types.forEach(t => map[t] = {});
  rows.forEach(r => { map[r.type_name][r.time] = r[field]; });
  const datasets = types.map(t => ({
    label: t,
    data: times.map(tm => (tm in map[t] ? map[t][tm] : null)),
    borderColor: pick(t),
    backgroundColor: pick(t),
    spanGaps: true, tension: 0.3, pointRadius: 2, borderWidth: 2,
  }));
  return { labels: times, datasets };
}

function latestByType(rows){
  const last = {};
  rows.forEach(r => { last[r.type_name] = r; });
  return Object.values(last).sort((a,b)=> a.type_name.localeCompare(b.type_name));
}

const baseOpts = {
  responsive: true, maintainAspectRatio: false,
  interaction: { mode: "nearest", intersect: false },
  scales: {
    x: { grid: { color: "#222a3a" }, ticks: { color: "#8b95a7" } },
    y: { grid: { color: "#222a3a" }, ticks: { color: "#8b95a7" }, beginAtZero: true },
  },
  plugins: { legend: { labels: { color: "#cdd3df", boxWidth: 12 } } },
};

const latencyChart = new Chart(document.getElementById("latencyChart"), {
  type: "line", data: { labels: [], datasets: [] }, options: baseOpts,
});
const toolsChart = new Chart(document.getElementById("toolsChart"), {
  type: "line", data: { labels: [], datasets: [] }, options: baseOpts,
});

function renderStatus(s, total, shown){
  const el = document.getElementById("status");
  const ok = s && s.connected;
  const label = s && s.demo ? "demo data" : (ok ? "connected to Kafka" : "waiting for Kafka…");
  const counts = shown === total ? `${total} records` : `${shown} / ${total} records`;
  el.innerHTML = `<span class="dot ${ok ? "ok" : "off"}"></span>${label} · ${counts}`;
}

function renderTable(rows){
  const tbody = document.querySelector("#latest tbody");
  if(!rows.length){ tbody.innerHTML = '<tr><td colspan="4" class="empty">no data for the current filters</td></tr>'; return; }
  tbody.innerHTML = latestByType(rows).map(r => `
    <tr>
      <td><span class="swatch" style="background:${pick(r.type_name)}"></span>${r.type_name}</td>
      <td class="num">${r.avg_latency_ms.toLocaleString("en-US")}</td>
      <td class="num">${r.median_tool_calls_count}</td>
      <td class="num">${r.time}</td>
    </tr>`).join("");
}

async function refresh(){
  try{
    const resp = await fetch("/data");
    const { status, rows } = await resp.json();
    syncChips(rows);
    const filtered = applyFilters(rows);
    renderStatus(status, rows.length, filtered.length);
    const lat = buildSeries(filtered, "avg_latency_ms");
    latencyChart.data = lat; latencyChart.update("none");
    const tc = buildSeries(filtered, "median_tool_calls_count");
    toolsChart.data = tc; toolsChart.update("none");
    renderTable(filtered);
  }catch(e){ /* server unavailable — try again next tick */ }
}

const windowSel = document.getElementById("windowSel");
windowSel.value = String(windowMin);                 // reflect URL / default
document.getElementById("allBtn").onclick = () => { hidden.clear(); renderChips(); refresh(); };
document.getElementById("noneBtn").onclick = () => { knownTypes.forEach(t => hidden.add(t)); renderChips(); refresh(); };
windowSel.onchange = (e) => { windowMin = parseInt(e.target.value, 10); refresh(); };

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
